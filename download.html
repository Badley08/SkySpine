<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkySpine - Telecharger le projet</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07090f;color:#eef2f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.card{background:#131922;border:1px solid #1e2a3a;border-radius:14px;padding:40px 32px;max-width:420px;width:100%;text-align:center;display:flex;flex-direction:column;gap:20px}
h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,#fff 0%,#38bdf8 60%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
p{color:#7a8fa8;font-size:14px;line-height:1.6}
.btn{padding:14px 24px;border:none;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer;transition:all .22s ease;font-family:inherit;width:100%}
.btn-primary{background:linear-gradient(135deg,#38bdf8 0%,#0ea5e9 100%);color:#04080f;box-shadow:0 4px 20px rgba(56,189,248,0.28)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(56,189,248,0.4)}
.btn-primary:active{transform:scale(0.97)}
.btn-primary:disabled{opacity:0.5;cursor:default;transform:none}
.status{font-size:13px;color:#38bdf8;min-height:20px}
.file-list{background:#0d1117;border:1px solid #1e2a3a;border-radius:9px;padding:16px;text-align:left;font-size:12px;color:#3d4e62;line-height:2;max-height:200px;overflow-y:auto}
.file-list span{color:#7a8fa8}
</style>
</head>
<body>
<div class="card">
    <div>
        <h1>SkySpine</h1>
        <p style="margin-top:8px">Telecharge tous les fichiers du projet en un seul ZIP, pret pour Netlify.</p>
    </div>

    <div class="file-list" id="file-list">
        <span>Chargement des fichiers...</span>
    </div>

    <p class="status" id="status"></p>

    <button class="btn btn-primary" id="btn-download" onclick="generateZip()">
        Telecharger SkySpine.zip
    </button>
</div>

<script>

  'manifest.json': `{
  "name": "SkySpine",
  "short_name": "SkySpine",
  "description": "Jeu d'avion 2D - Evite les oiseaux et les eclairs",
  "start_url": "/",
  "scope": "/",
  "display": "standalone",
  "orientation": "landscape",
  "background_color": "#0a0e1a",
  "theme_color": "#1a2a4a",
  "icons": [
    {
      "src": "/assets/skypine.png",
      "sizes": "512x512",
      "type": "image/png",
      "purpose": "any maskable"
    }
  ]
}`,

  'sw.js': `const CACHE_NAME = 'skyspine-v3';
const ASSETS_TO_CACHE = [
    '/','index.html','manifest.json',
    'css/base.css','css/components.css','css/screens.css','css/game.css',
    'js/app.js','js/db.js','js/assets.js','js/controls.js','js/weather.js',
    'js/obstacles.js','js/collision.js','js/renderer.js','js/game.js',
    'js/firebase.js','js/planes.js','js/quests.js','js/sound.js',
    'assets/biplane.png','assets/avion_bleu.png','assets/explosion_2d.png','assets/skypine.png',
    'assets/backgrounds/background_plage.png','assets/backgrounds/village.png',
    'assets/ennemis/avion_rouge.png','assets/ennemis/nuage_eclair.png',
    'assets/ennemis/oiseau_1_gauche.png','assets/ennemis/oiseau_2_gauche.png',
    'assets/svg/chevron-left.svg','assets/svg/download-cloud.svg',
    'assets/svg/gear-solid-full.svg','assets/svg/house-regular-full.svg'
];
self.addEventListener('install',(e)=>{e.waitUntil(caches.open(CACHE_NAME).then(c=>c.addAll(ASSETS_TO_CACHE)));self.skipWaiting();});
self.addEventListener('activate',(e)=>{e.waitUntil(caches.keys().then(ns=>Promise.all(ns.filter(n=>n!==CACHE_NAME).map(n=>caches.delete(n)))));self.clients.claim();});
self.addEventListener('fetch',(e)=>{if(e.request.url.includes('firestore.googleapis.com')||e.request.url.includes('firebase'))return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(nr=>{if(nr&&nr.status===200&&nr.type==='basic'){const c=nr.clone();caches.open(CACHE_NAME).then(ca=>ca.put(e.request,c));}return nr;})));});`,

  'css/base.css': `*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
    --bg-dark:#07090f;--bg-panel:#0d1117;--bg-card:#131922;--bg-card-hover:#1a2230;
    --border:#1e2a3a;--border-light:#263040;
    --accent:#38bdf8;--accent-dim:rgba(56,189,248,0.12);--accent-glow:rgba(56,189,248,0.28);--accent-hover:#7dd3fc;
    --gold:#f59e0b;--gold-dim:rgba(245,158,11,0.15);--silver:#94a3b8;--bronze:#b45309;
    --success:#22c55e;--success-dim:rgba(34,197,94,0.15);
    --danger:#ef4444;--danger-dim:rgba(239,68,68,0.10);--danger-hover:#f87171;
    --text-primary:#eef2f7;--text-secondary:#7a8fa8;--text-muted:#3d4e62;
    --radius:14px;--radius-sm:9px;--radius-xs:6px;
    --transition:0.22s ease;--transition-slow:0.42s ease;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI','SF Pro Display',system-ui,sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg-dark);color:var(--text-primary);font-family:var(--font);-webkit-font-smoothing:antialiased;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}`,

  'css/components.css': `/* Boutons */
.btn{width:100%;padding:14px 24px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;transition:all var(--transition);letter-spacing:0.2px;font-family:var(--font);}
.btn-primary{background:linear-gradient(135deg,var(--accent) 0%,#0ea5e9 100%);color:#04080f;box-shadow:0 4px 20px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,0.15);}
.btn-primary:hover{box-shadow:0 6px 28px var(--accent-glow);transform:translateY(-1px);}
.btn-primary:active{transform:scale(0.97) translateY(0);box-shadow:0 2px 10px var(--accent-glow);}
.btn-secondary{background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border-light);}
.btn-secondary:hover{background:var(--bg-card-hover);}
.btn-secondary:active{transform:scale(0.97);}
.btn-danger{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(239,68,68,0.3);}
.btn-danger:hover{background:rgba(239,68,68,0.18);}
.btn-gold{background:linear-gradient(135deg,var(--gold) 0%,#d97706 100%);color:#04080f;box-shadow:0 4px 20px var(--gold-dim);}
.btn-gold:active{transform:scale(0.97);}
.btn-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:var(--bg-card);border:1px solid var(--border-light);border-radius:50%;cursor:pointer;transition:all var(--transition);color:var(--text-secondary);}
.btn-icon:hover{background:var(--bg-card-hover);color:var(--text-primary);}
.btn-icon:active{transform:scale(0.88);}
.btn-icon .icon{width:20px;height:20px;filter:invert(0.7);}
.btn-icon .icon-svg,.icon-svg{width:20px;height:20px;stroke:currentColor;fill:none;}
/* Input */
.input-field{width:100%;padding:13px 16px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-sm);color:var(--text-primary);font-size:15px;outline:none;transition:border-color var(--transition),box-shadow var(--transition);font-family:var(--font);}
.input-field:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
.input-field::placeholder{color:var(--text-muted);}
.label{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.7px;}
/* Toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);font-size:14px;color:var(--text-primary);}
.toggle-switch{position:relative;width:44px;height:26px;cursor:pointer;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--border-light);border-radius:13px;transition:background var(--transition);}
.toggle-slider::before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform var(--transition);box-shadow:0 1px 4px rgba(0,0,0,0.4);}
.toggle-switch input:checked+.toggle-slider{background:var(--accent);}
.toggle-switch input:checked+.toggle-slider::before{transform:translateX(18px);}
/* Coin */
.coin-icon-small{width:16px;height:16px;background:radial-gradient(circle at 40% 35%,var(--gold),#b45309);border-radius:50%;flex-shrink:0;box-shadow:0 0 6px rgba(245,158,11,0.5);}
/* Leaderboard */
.lb-entry{display:flex;align-items:center;gap:14px;padding:12px 14px;background:var(--bg-card);border-radius:var(--radius-sm);border:1px solid var(--border);transition:background var(--transition);}
.lb-entry.lb-mine{border-color:var(--accent);background:var(--accent-dim);}
.lb-rank{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:13px;font-weight:700;background:var(--border-light);color:var(--text-secondary);flex-shrink:0;}
.lb-entry.rank-1 .lb-rank{background:linear-gradient(135deg,#f59e0b,#d97706);color:#04080f;}
.lb-entry.rank-2 .lb-rank{background:linear-gradient(135deg,#94a3b8,#64748b);color:#04080f;}
.lb-entry.rank-3 .lb-rank{background:linear-gradient(135deg,#b45309,#7c2d12);color:#fff;}
.lb-name{flex:1;font-size:14px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lb-score{font-size:14px;color:var(--accent);font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;}
/* Garage */
.garage-card{display:flex;flex-direction:column;align-items:center;gap:10px;padding:18px 12px;background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all var(--transition);position:relative;}
.garage-card.active-plane{border-color:var(--accent);background:var(--accent-dim);box-shadow:0 0 0 3px var(--accent-glow);}
.garage-card.locked{opacity:0.6;cursor:default;}
.garage-card img{width:70px;height:auto;}
.garage-card-name{font-size:13px;font-weight:600;color:var(--text-primary);}
.garage-card-status{font-size:11px;color:var(--text-muted);}
.garage-card.active-plane .garage-card-status{color:var(--accent);}
.garage-lock-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;border-radius:var(--radius);background:rgba(7,9,15,0.7);}
.garage-unlock-label{font-size:10px;color:var(--text-muted);text-align:center;padding:0 4px;line-height:1.4;}
.garage-select-btn{font-size:12px;padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-weight:600;transition:all var(--transition);}
/* Quests */
.quest-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:10px;}
.quest-card.completed{border-color:var(--success);background:var(--success-dim);}
.quest-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.quest-title{font-size:14px;font-weight:600;color:var(--text-primary);line-height:1.4;}
.quest-reward{display:flex;align-items:center;gap:5px;white-space:nowrap;font-size:13px;font-weight:700;color:var(--gold);}
.quest-progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.quest-progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 0.4s ease;}
.quest-card.completed .quest-progress-fill{background:var(--success);}
.quest-progress-label{font-size:11px;color:var(--text-muted);}
/* Active plane card */
.active-plane-card{display:flex;align-items:center;gap:14px;padding:14px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius);}
.active-plane-card img{width:60px;height:auto;}
.active-plane-name{font-size:15px;font-weight:700;color:var(--text-primary);display:block;}
.active-plane-sub{font-size:12px;color:var(--text-muted);display:block;margin-top:3px;}
/* Tabs */
.lb-tabs{display:flex;gap:4px;background:var(--bg-card);border-radius:var(--radius-sm);padding:4px;}
.lb-tab{flex:1;padding:8px;background:transparent;border:none;border-radius:6px;color:var(--text-muted);font-size:13px;font-weight:600;cursor:pointer;transition:all var(--transition);font-family:var(--font);}
.lb-tab.active{background:var(--bg-panel);color:var(--text-primary);box-shadow:0 1px 4px rgba(0,0,0,0.3);}`,

  'css/screens.css': `/* Screens */

.loading-logo-block{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:32px;}

@keyframes slideUp{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}

  'js/firebase.js': `const FIREBASE_CONFIG={apiKey:"AIzaSyAr0C5DTL1zzdilQXScj9mmynX995MPeCs",authDomain:"skyspine-146ae.firebaseapp.com",projectId:"skyspine-146ae",storageBucket:"skyspine-146ae.firebasestorage.app",messagingSenderId:"888566895773",appId:"1:888566895773:web:d72a5d955cf2f55c8a3074",measurementId:"G-XTQWRHBEK3"};
const FIRESTORE_BASE=\`https://firestore.googleapis.com/v1/projects/\${FIREBASE_CONFIG.projectId}/databases/(default)/documents\`;
function firestoreValue(val){if(typeof val==='string')return{stringValue:val};if(typeof val==='number')return{integerValue:String(Math.floor(val))};if(typeof val==='boolean')return{booleanValue:val};return{nullValue:null};}
function parseFirestoreDoc(doc){if(!doc||!doc.fields)return null;const out={};for(const[key,val]of Object.entries(doc.fields)){if('stringValue'in val)out[key]=val.stringValue;else if('integerValue'in val)out[key]=parseInt(val.integerValue,10);else if('doubleValue'in val)out[key]=val.doubleValue;else if('booleanValue'in val)out[key]=val.booleanValue;else out[key]=null;}if(doc.name)out._id=doc.name.split('/').pop();return out;}
async function firestoreQuery(collection,orderField,limit=20){const body={structuredQuery:{from:[{collectionId:collection}],orderBy:[{field:{fieldPath:orderField},direction:'DESCENDING'}],limit:limit}};const url=\`\${FIRESTORE_BASE}:runQuery?key=\${FIREBASE_CONFIG.apiKey}\`;const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if(!res.ok)throw new Error('Firestore query failed');const data=await res.json();return data.filter(d=>d.document).map(d=>parseFirestoreDoc(d.document));}
async function firestoreAddDoc(collection,fields){const ff={};for(const[k,v]of Object.entries(fields))ff[k]=firestoreValue(v);const url=\`\${FIRESTORE_BASE}/\${collection}?key=\${FIREBASE_CONFIG.apiKey}\`;const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:ff})});if(!res.ok)throw new Error('Firestore add failed');return res.json();}
async function firestoreSetDoc(collection,docId,fields){const ff={};for(const[k,v]of Object.entries(fields))ff[k]=firestoreValue(v);const url=\`\${FIRESTORE_BASE}/\${collection}/\${docId}?key=\${FIREBASE_CONFIG.apiKey}\`;const res=await fetch(url,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:ff})});if(!res.ok)throw new Error('Firestore set failed');return res.json();}
export async function saveGlobalScore(name,distance){try{await firestoreAddDoc('scores',{name,distance,timestamp:Date.now()});}catch(e){console.warn('Score non sauvegarde:',e);}}
export async function getGlobalTopScores(limit=20){try{return await firestoreQuery('scores','distance',limit);}catch(e){return[];}}
export async function saveGlobalBestPath(name,distance,path){try{const existing=await firestoreQuery('ghost','distance',1);if(existing.length===0||distance>existing[0].distance){const pathStr=JSON.stringify(path.slice(0,2000));await firestoreAddDoc('ghost',{name,distance,path:pathStr,timestamp:Date.now()});}}catch(e){}}
export async function getGlobalBestPath(){try{const docs=await firestoreQuery('ghost','distance',1);if(docs.length===0)return null;const doc=docs[0];return{name:doc.name,distance:doc.distance,path:JSON.parse(doc.path||'[]')};}catch(e){return null;}}
export async function saveQuestProgress(pilotId,questId,progress,completed){try{await firestoreSetDoc('quests',\`\${pilotId}_\${questId}\`,{pilotId,questId,progress,completed});}catch(e){}}
export async function getQuestProgress(pilotId){try{const body={structuredQuery:{from:[{collectionId:'quests'}],where:{fieldFilter:{field:{fieldPath:'pilotId'},op:'EQUAL',value:{stringValue:pilotId}}}}};const url=\`\${FIRESTORE_BASE}:runQuery?key=\${FIREBASE_CONFIG.apiKey}\`;const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if(!res.ok)return{};const data=await res.json();const result={};data.filter(d=>d.document).forEach(d=>{const doc=parseFirestoreDoc(d.document);result[doc.questId]={progress:doc.progress,completed:doc.completed};});return result;}catch(e){return{};}}`,

  'js/sound.js': `let ctx=null;let soundEnabled=true;
function getCtx(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();return ctx;}
export function setSoundEnabled(val){soundEnabled=val;}
function playTone(o){if(!soundEnabled)return;try{const ac=getCtx();const osc=ac.createOscillator();const gain=ac.createGain();osc.connect(gain);gain.connect(ac.destination);osc.type=o.type||'sine';osc.frequency.setValueAtTime(o.freq||440,ac.currentTime);if(o.freqEnd)osc.frequency.linearRampToValueAtTime(o.freqEnd,ac.currentTime+(o.duration||0.1));gain.gain.setValueAtTime(o.volume||0.3,ac.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+(o.duration||0.1));osc.start(ac.currentTime);osc.stop(ac.currentTime+(o.duration||0.1)+0.02);}catch(e){}}
function playNoise(o){if(!soundEnabled)return;try{const ac=getCtx();const bs=ac.sampleRate*(o.duration||0.1);const buf=ac.createBuffer(1,bs,ac.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<bs;i++)d[i]=Math.random()*2-1;const src=ac.createBufferSource();src.buffer=buf;const gain=ac.createGain();const filter=ac.createBiquadFilter();filter.type=o.filterType||'bandpass';filter.frequency.value=o.filterFreq||200;filter.Q.value=o.filterQ||1;src.connect(filter);filter.connect(gain);gain.connect(ac.destination);gain.gain.setValueAtTime(o.volume||0.2,ac.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+(o.duration||0.1));src.start();}catch(e){}}
export function playThrust(){playNoise({duration:0.06,filterType:'bandpass',filterFreq:600,filterQ:0.5,volume:0.07});}
export function playExplosion(){playNoise({duration:0.5,filterType:'lowpass',filterFreq:150,filterQ:0.8,volume:0.5});playTone({type:'sawtooth',freq:80,freqEnd:20,duration:0.4,volume:0.3});}
export function playLightningStrike(){playNoise({duration:0.2,filterType:'highpass',filterFreq:2000,volume:0.4});playTone({type:'square',freq:220,freqEnd:40,duration:0.15,volume:0.2});}
export function playBirdHit(){playTone({type:'sine',freq:300,freqEnd:100,duration:0.12,volume:0.25});}
export function playMissile(){playTone({type:'sawtooth',freq:500,freqEnd:200,duration:0.3,volume:0.35});playNoise({duration:0.3,filterFreq:400,volume:0.15});}
export function playCoinEarned(){playTone({type:'sine',freq:880,duration:0.06,volume:0.2});setTimeout(()=>playTone({type:'sine',freq:1100,duration:0.06,volume:0.2}),60);}
export function playQuestComplete(){[523,659,784,1047].forEach((freq,i)=>setTimeout(()=>playTone({type:'sine',freq,duration:0.12,volume:0.25}),i*100));}

  'js/collision.js': `const SHRINK=0.2;
export function rectsCollide(ax,ay,aw,ah,bx,by,bw,bh){const asx=ax+aw*SHRINK,asy=ay+ah*SHRINK,asw=aw*(1-2*SHRINK),ash=ah*(1-2*SHRINK);const bsx=bx+bw*SHRINK,bsy=by+bh*SHRINK,bsw=bw*(1-2*SHRINK),bsh=bh*(1-2*SHRINK);return asx<bsx+bsw&&asx+asw>bsx&&asy<bsy+bsh&&asy+ash>bsy;}
export function checkGroundCollision(planeY,planeHeight,groundY){return(planeY+planeHeight)>=groundY;}
export function checkLightningHit(lightnings,px,py,pw,ph){for(const l of lightnings){if(l.alpha<=0.3)continue;for(const seg of l.segments){if(lineIntersectsRect(seg.x1,seg.y1,seg.x2,seg.y2,px,py,pw,ph))return true;}}return false;}
function lineIntersectsRect(x1,y1,x2,y2,rx,ry,rw,rh){const s=0.25;rx+=rw*s;ry+=rh*s;rw*=(1-2*s);rh*=(1-2*s);return linesIntersect(x1,y1,x2,y2,rx,ry,rx+rw,ry)||linesIntersect(x1,y1,x2,y2,rx+rw,ry,rx+rw,ry+rh)||linesIntersect(x1,y1,x2,y2,rx,ry+rh,rx+rw,ry+rh)||linesIntersect(x1,y1,x2,y2,rx,ry,rx,ry+rh);}
function linesIntersect(x1,y1,x2,y2,x3,y3,x4,y4){const denom=(x1-x2)*(y3-y4)-(y1-y2)*(x3-x4);if(Math.abs(denom)<0.001)return false;const t=((x1-x3)*(y3-y4)-(y1-y3)*(x3-x4))/denom;const u=-((x1-x2)*(y1-y3)-(y1-y2)*(x1-x3))/denom;return t>=0&&t<=1&&u>=0&&u<=1;}`,

  'js/obstacles.js': `export function spawnObstacle(weather,canvasW,canvasH,groundY,scrollSpeed){const obs=[];if(weather==='clear'){const bt=Math.random()>0.5?'oiseau_1':'oiseau_2';obs.push({type:'bird',asset:bt,x:canvasW+50,y:40+Math.random()*(groundY-100),width:55,height:45,speed:scrollSpeed+0.5+Math.random()*1.5,diving:false,divingSpeed:0});}else if(weather==='cloudy'){const roll=Math.random();if(roll<0.4){obs.push({type:'plane',asset:'ennemi_avion',x:canvasW+50,y:30+Math.random()*(groundY-120),width:70,height:50,speed:scrollSpeed+1.5+Math.random()});}else if(roll<0.7){const baseY=60+Math.random()*(groundY-220);const count=2+Math.floor(Math.random()*2);for(let i=0;i<count;i++){const bt=Math.random()>0.5?'oiseau_1':'oiseau_2';obs.push({type:'bird',asset:bt,x:canvasW+50+i*50,y:baseY+i*35,width:50,height:40,speed:scrollSpeed+0.8+Math.random(),diving:false,divingSpeed:0});}}else{const bt=Math.random()>0.5?'oiseau_1':'oiseau_2';obs.push({type:'bird',asset:bt,x:canvasW+50,y:30+Math.random()*(groundY*0.3),width:55,height:45,speed:scrollSpeed+1,diving:true,divingSpeed:1+Math.random()*1.5});}}else{const roll=Math.random();if(roll<0.5){obs.push({type:'cloud',asset:'ennemi_nuage',x:canvasW+80,y:20+Math.random()*(groundY*0.4),width:75,height:60,speed:scrollSpeed+0.5});}else{const bt=Math.random()>0.5?'oiseau_1':'oiseau_2';obs.push({type:'bird',asset:bt,x:canvasW+50,y:40+Math.random()*(groundY-120),width:55,height:45,speed:scrollSpeed+2+Math.random()*2,diving:Math.random()>0.6,divingSpeed:1.5+Math.random()*2});}}return obs;}

  'js/db.js': `const DB_NAME='SkySpineDB';const DB_VERSION=2;const STORE_SCORES='scores';const STORE_SETTINGS='settings';const STORE_QUEST_PROGRESS='quest_progress';
function openDB(){return new Promise((resolve,reject)=>{const req=indexedDB.open(DB_NAME,DB_VERSION);req.onupgradeneeded=(e)=>{const db=e.target.result;if(!db.objectStoreNames.contains(STORE_SCORES)){const s=db.createObjectStore(STORE_SCORES,{keyPath:'id',autoIncrement:true});s.createIndex('distance','distance',{unique:false});}if(!db.objectStoreNames.contains(STORE_SETTINGS))db.createObjectStore(STORE_SETTINGS,{keyPath:'key'});if(!db.objectStoreNames.contains(STORE_QUEST_PROGRESS))db.createObjectStore(STORE_QUEST_PROGRESS,{keyPath:'questId'});};req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error);});}
export async function saveScore(name,distance){const db=await openDB();return new Promise((resolve,reject)=>{const tx=db.transaction(STORE_SCORES,'readwrite');tx.objectStore(STORE_SCORES).add({name,distance:Math.floor(distance),date:Date.now()});tx.oncomplete=()=>resolve();tx.onerror=()=>reject(tx.error);});}

export async function saveSetting(key,value){const db=await openDB();return new Promise((resolve,reject)=>{const tx=db.transaction(STORE_SETTINGS,'readwrite');tx.objectStore(STORE_SETTINGS).put({key,value});tx.oncomplete=()=>resolve();tx.onerror=()=>reject(tx.error);});}
export async function getSetting(key){const db=await openDB();return new Promise((resolve,reject)=>{const tx=db.transaction(STORE_SETTINGS,'readonly');const req=tx.objectStore(STORE_SETTINGS).get(key);req.onsuccess=()=>resolve(req.result?req.result.value:null);req.onerror=()=>reject(req.error);});}
export async function getCoins(){return(await getSetting('spinecoins'))||0;}

  'js/renderer.js': `import{assets}from'./assets.js';
let shakeX=0,shakeY=0,shakeMag=0;

function strToU8(str) {
  return new TextEncoder().encode(str);
}

function u32LE(n) {
  const b = new Uint8Array(4);
  b[0] = n & 0xff; b[1] = (n >> 8) & 0xff;
  b[2] = (n >> 16) & 0xff; b[3] = (n >> 24) & 0xff;
  return b;
}

function u16LE(n) {
  const b = new Uint8Array(2);
  b[0] = n & 0xff; b[1] = (n >> 8) & 0xff;
  return b;
}

function crc32(data) {
  const table = (() => {
    const t = new Uint32Array(256);
    for (let i = 0; i < 256; i++) {
      let c = i;
      for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
      t[i] = c;
    }
    return t;
  })();
  let crc = 0xFFFFFFFF;
  for (let i = 0; i < data.length; i++) crc = table[(crc ^ data[i]) & 0xff] ^ (crc >>> 8);
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

function concat(...arrays) {
  const total = arrays.reduce((s, a) => s + a.length, 0);
  const out = new Uint8Array(total);
  let offset = 0;
  for (const a of arrays) { out.set(a, offset); offset += a.length; }
  return out;
}

  const size = contentBytes.length;

  const localHeader = concat(
    new Uint8Array([0x50, 0x4B, 0x03, 0x04]),
    u16LE(20), u16LE(0), u16LE(0),
    u16LE(0), u16LE(0),
    u32LE(crc), u32LE(size), u32LE(size),
    u16LE(nameBytes.length), u16LE(0),
    nameBytes
  );

  const centralDir = concat(
    new Uint8Array([0x50, 0x4B, 0x01, 0x02]),
    u16LE(20), u16LE(20), u16LE(0), u16LE(0),
    u16LE(0), u16LE(0), u16LE(0),
    u32LE(crc), u32LE(size), u32LE(size),
    u16LE(nameBytes.length), u16LE(0), u16LE(0), u16LE(0), u16LE(0),
    u32LE(0), u32LE(0),
    nameBytes
  );

  return { localHeader, data: contentBytes, centralDir, localSize: localHeader.length + contentBytes.length };
}

async function generateZip() {
  const btn = document.getElementById('btn-download');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = 'Generation du ZIP en cours...';

  await new Promise(r => setTimeout(r, 50));

  const entries = [];
  let offset = 0;

  for (const [filename, content] of Object.entries(FILES)) {
    const entry = zipEntry(filename, content);
    entry.offset = offset;
    entries.push(entry);
    offset += entry.localHeader.length + entry.data.length;
  }

  const centralDirOffset = offset;
  const centralDirs = entries.map(e => {
    const nameBytes = strToU8(Object.keys(FILES)[entries.indexOf(e)]);
    const cd = concat(
      new Uint8Array([0x50, 0x4B, 0x01, 0x02]),
      u16LE(20), u16LE(20), u16LE(0), u16LE(0),
      u16LE(0), u16LE(0), u16LE(0),
      u32LE(crc32(e.data)), u32LE(e.data.length), u32LE(e.data.length),
      u16LE(nameBytes.length), u16LE(0), u16LE(0), u16LE(0), u16LE(0),
      u32LE(0), u32LE(e.offset),
      nameBytes
    );
    return cd;
  });

  const centralDirData = concat(...centralDirs);
  const centralDirSize = centralDirData.length;

  const eocd = concat(
    new Uint8Array([0x50, 0x4B, 0x05, 0x06]),
    u16LE(0), u16LE(0),
    u16LE(entries.length), u16LE(entries.length),
    u32LE(centralDirSize), u32LE(centralDirOffset),
    u16LE(0)
  );

  const parts = [];
  for (const e of entries) {
    parts.push(e.localHeader);
    parts.push(e.data);
  }
  parts.push(centralDirData);
  parts.push(eocd);

  const zipData = concat(...parts);
  const blob = new Blob([zipData], { type: 'application/zip' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'SkySpine.zip';
  a.click();
  URL.revokeObjectURL(url);

  status.textContent = 'Telecharge ! Les fichiers images (PNG/SVG) sont a ajouter manuellement dans les dossiers assets/.';
  btn.disabled = false;
}
</script>
